<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>World Fuel Price</title>


  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: #e9eef5;
      background:
        radial-gradient(circle at 80% 10%, rgba(180, 190, 230, 0.35), transparent 28%),
        linear-gradient(135deg, #505762 0%, #666a78 42%, #4e5365 100%);
      min-height: 100vh;
    }

    .page {
      width: 100%;
      padding: 18px;
    }

    .top-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .quote-card {
      min-width: 250px;
      height: 82px;
      background: #111926;
      border-radius: 6px;
      display: grid;
      grid-template-columns: 78px 1px 1fr;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 5px 14px rgba(0,0,0,0.35);
      border-bottom: 2px solid rgba(255, 148, 80, 0.45);
    }

    .quote-count {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #d8e0ea;
    }

    .quote-count .num {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }

    .quote-count .label {
      font-size: 13px;
      color: #aeb8c8;
      margin-top: 7px;
    }

    .quote-sep {
      background: rgba(255,255,255,0.12);
      margin: 12px 0;
    }

    .quote-info {
      padding: 14px 16px;
      overflow: hidden;
    }

    .quote-info .icao {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: #d9e1eb;
      line-height: 1;
      margin-bottom: 10px;
    }

    .quote-info .condition {
      font-size: 13px;
      color: #aeb8c8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: uppercase;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.2);
      margin: 18px 0 28px;
    }

    .input-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
    }

    input,
    button {
      height: 40px;
      font-size: 15px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    input {
      width: 300px;
      padding: 0 12px;
      text-transform: uppercase;
      background: rgba(255,255,255,0.93);
      color: #111;
    }

    button {
      padding: 0 26px;
      background: #111926;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    button:hover {
      background: #1a2638;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .search-area {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .search-title {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      margin-right: 4px;
    }

    .pill {
      background: #172335;
      border-radius: 999px;
      padding: 8px 22px;
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      min-width: 78px;
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .status {
      margin-top: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #dce5f0;
      min-height: 20px;
    }

    .success {
      color: #d7ffe2;
      font-weight: 700;
    }

    .error {
      color: #ffb0b0;
      font-weight: 700;
    }

    .airport-section {
      margin-bottom: 34px;
    }

    .airport-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 14px;
      color: #ffffff;
      letter-spacing: 0.3px;
    }

    .fbo-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 26px;
    }

    .fbo-card {
      min-width: 0;
    }

    .fbo-title {
      font-size: 14px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .fuel-table {
      width: 100%;
      border-collapse: collapse;
      background: #1d2838;
      color: #dfe8f4;
      font-size: 13px;
      overflow: hidden;
      border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
    }

    .fuel-table thead tr:first-child th {
      background: #223244;
      color: #ffffff;
      text-align: left;
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 800;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }

    .fuel-table thead tr:nth-child(2) th {
      background: #1d2838;
      color: #bfc9d9;
      padding: 12px 8px;
      font-size: 11px;
      font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .fuel-table td {
      padding: 15px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-weight: 700;
      color: #dce6f2;
    }

    .fuel-table td:nth-child(1) {
      text-align: left;
    }

    .fuel-table td:nth-child(2) {
      text-align: center;
    }

    .fuel-table tbody tr:hover {
      background: rgba(255,255,255,0.035);
    }

    .empty-box {
      background: rgba(17, 25, 38, 0.65);
      border-radius: 8px;
      padding: 30px;
      text-align: center;
      color: #c5ceda;
      font-weight: 700;
    }

    .footer-note {
      margin-top: 12px;
      color: #c4ccd8;
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .fbo-grid {
        grid-template-columns: 1fr;
      }

      .quote-card {
        min-width: calc(50% - 8px);
      }
    }

    @media (max-width: 600px) {
      .page {
        padding: 12px;
      }

      .quote-card {
        min-width: 100%;
      }

      .input-panel {
        display: grid;
        grid-template-columns: 1fr;
      }

      input,
      button {
        width: 100%;
      }

      .search-area {
        gap: 7px;
      }

      .pill {
        padding: 7px 14px;
      }

      .fuel-table {
        font-size: 12px;
      }

      .fuel-table td {
        padding: 12px 8px;
      }
    }
  </style>



  
</head>

<body>
  <div class="page">

    <div id="summaryCards" class="top-panel"></div>

    <div class="divider"></div>

    <div class="input-panel">
      <input
        id="icaoInput"
        placeholder="ICAO 예: KEWR PANC KIAD"
        autocomplete="off"
      />
      <button id="searchBtn" onclick="searchFuelPrice()">조회</button>
      <button id="clearBtn" onclick="clearResult()">초기화</button>
    </div>

    <div class="search-area">
      <span class="search-title">Your Search:</span>
      <span id="searchIcaoPill" class="pill">-</span>
      <span class="pill">International</span>
      <span class="pill">Corporate / Private</span>
    </div>

    <div id="status" class="status">
      ICAO를 입력하세요. 예: KEWR PANC KIAD
    </div>

    <div id="resultArea">
      <div class="empty-box">조회 결과 없음</div>
    </div>

    <div class="footer-note">
      Price 기준: World Fuel API Total Price / UOM: USG 기준
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypSQqFll0SorZkNJe6LWz6KKpqv-xELiPWZ32MYP5l_80AuxHwRfMLBFl-rxrtBuWAoA/exec";

    function searchFuelPrice() {
      const inputEl = document.getElementById("icaoInput");
      const statusEl = document.getElementById("status");
      const resultArea = document.getElementById("resultArea");
      const searchBtn = document.getElementById("searchBtn");

      const icaoRaw = inputEl.value.trim().toUpperCase();

      const icaoList = icaoRaw
        .split(/[\s,]+/)
        .map(x => x.trim().toUpperCase())
        .filter(Boolean);

      const invalidList = icaoList.filter(x => !/^[A-Z]{4}$/.test(x));

      if (icaoList.length === 0) {
        statusEl.innerHTML =
          '<span class="error">ICAO를 입력하세요. 예: KEWR PANC KIAD</span>';
        return;
      }

      if (invalidList.length > 0) {
        statusEl.innerHTML =
          '<span class="error">ICAO 형식 오류: ' +
          escapeHtml(invalidList.join(", ")) +
          '</span>';
        return;
      }

      searchBtn.disabled = true;
      statusEl.textContent = "조회 중...";
      resultArea.innerHTML = '<div class="empty-box">Loading...</div>';
      document.getElementById("summaryCards").innerHTML = "";
      document.getElementById("searchIcaoPill").textContent = icaoList.join(", ");

      const callbackName = "wfsCallback_" + Date.now();

      window[callbackName] = function (data) {
        try {
          handleFuelPriceResult(data, icaoList);
        } catch (err) {
          resultArea.innerHTML = '<div class="empty-box">조회 실패</div>';
          statusEl.innerHTML =
            '<span class="error">' + escapeHtml(err.message) + '</span>';
        } finally {
          searchBtn.disabled = false;
          delete window[callbackName];

          const oldScript = document.getElementById(callbackName);
          if (oldScript) oldScript.remove();
        }
      };

      const script = document.createElement("script");
      script.id = callbackName;

      script.onerror = function () {
        resultArea.innerHTML = '<div class="empty-box">조회 실패</div>';
        statusEl.innerHTML =
          '<span class="error">Apps Script 호출 실패. Web App URL, 배포 권한, 또는 JSONP 설정을 확인하세요.</span>';

        searchBtn.disabled = false;
        delete window[callbackName];

        const oldScript = document.getElementById(callbackName);
        if (oldScript) oldScript.remove();
      };

      script.src =
        SCRIPT_URL +
        "?icao=" + encodeURIComponent(icaoList.join(",")) +
        "&callback=" + encodeURIComponent(callbackName) +
        "&t=" + Date.now();

      document.body.appendChild(script);
    }

    function handleFuelPriceResult(data, icaoList) {
      const statusEl = document.getElementById("status");
      const resultArea = document.getElementById("resultArea");

      if (!data.success && !data.partialSuccess) {
        throw new Error(data.message || formatErrors(data.errors) || "조회 실패");
      }

      const rows = data.rows || [];

      if (rows.length === 0) {
        resultArea.innerHTML = '<div class="empty-box">결과 없음</div>';
        statusEl.textContent = `${icaoList.join(", ")} / 조회 결과 없음`;
        renderSummaryCards([], icaoList);
        return;
      }

      renderSummaryCards(rows, data.icaoList || icaoList);
      renderAirportSections(rows, data.icaoList || icaoList);

      let statusText =
        `${(data.icaoList || icaoList).join(", ")} / ${rows.length}개 가격 구간 조회 완료`;

      if (data.generatedAtUtc) {
        statusText += ` / ${formatUtc(data.generatedAtUtc)}`;
      }

      if (data.errors && data.errors.length > 0) {
        statusEl.innerHTML =
          '<span class="success">' + escapeHtml(statusText) + '</span>' +
          '<br><span class="error">일부 공항 오류: ' +
          escapeHtml(formatErrors(data.errors)) +
          '</span>';
      } else {
        statusEl.innerHTML =
          '<span class="success">' + escapeHtml(statusText) + '</span>';
      }
    }

    function renderSummaryCards(rows, icaoList) {
      const summaryCards = document.getElementById("summaryCards");

      const grouped = groupBy(rows, r => r.icao || "");
      const cards = [];

      icaoList.forEach(icao => {
        const count = grouped[icao] ? grouped[icao].length : 0;

        cards.push(`
          <div class="quote-card">
            <div class="quote-count">
              <div class="num">${count}</div>
              <div class="label">Quotes</div>
            </div>
            <div class="quote-sep"></div>
            <div class="quote-info">
              <div class="icao">${escapeHtml(icao)}</div>
              <div class="condition">INTL / CORP</div>
            </div>
          </div>
        `);
      });

      summaryCards.innerHTML = cards.join("");
    }

    function renderAirportSections(rows, icaoList) {
      const resultArea = document.getElementById("resultArea");
      const byIcao = groupBy(rows, r => r.icao || "");

      const sections = [];

      icaoList.forEach(icao => {
        const airportRows = byIcao[icao] || [];

        if (airportRows.length === 0) {
          sections.push(`
            <section class="airport-section">
              <h2 class="airport-title">${escapeHtml(icao)}</h2>
              <div class="empty-box">조회 결과 없음</div>
            </section>
          `);
          return;
        }

        const byFbo = groupBy(airportRows, r => r.fbo || "UNKNOWN FBO");

        const fboCards = Object.keys(byFbo).map(fbo => {
          return renderFboCard(fbo, byFbo[fbo]);
        }).join("");

        sections.push(`
          <section class="airport-section">
            <h2 class="airport-title">${escapeHtml(icao)}</h2>
            <div class="fbo-grid">
              ${fboCards}
            </div>
          </section>
        `);
      });

      resultArea.innerHTML = sections.join("");
    }

    function renderFboCard(fbo, rows) {
      const fuelType = getFuelTypeText(rows);

      const body = rows.map(row => {
        const fromTo = `${escapeHtml(row.scaleFrom || "")} - ${escapeHtml(row.scaleTo || "")}`;

        return `
          <tr>
            <td>${fromTo}</td>
            <td>${formatPrice(row.totalPrice)}</td>
          </tr>
        `;
      }).join("");

      return `
        <div class="fbo-card">
          <div class="fbo-title">${escapeHtml(fbo)}</div>
          <table class="fuel-table">
            <thead>
              <tr>
                <th colspan="2">${escapeHtml(fuelType)}</th>
              </tr>
              <tr>
                <th>FROM - TO (USG)</th>
                <th>TOTAL PRICE (USD)</th>
              </tr>
            </thead>
            <tbody>
              ${body}
            </tbody>
          </table>
        </div>
      `;
    }

    function getFuelTypeText(rows) {
      if (!rows || rows.length === 0) return "FUEL";

      const types = [...new Set(
        rows
          .map(r => r.fuelType || "")
          .filter(Boolean)
      )];

      if (types.length === 0) return "FUEL";
      return types.join(" / ");
    }

    function clearResult() {
      document.getElementById("icaoInput").value = "";
      document.getElementById("status").textContent =
        "ICAO를 입력하세요. 예: KEWR PANC KIAD";
      document.getElementById("resultArea").innerHTML =
        '<div class="empty-box">조회 결과 없음</div>';
      document.getElementById("summaryCards").innerHTML = "";
      document.getElementById("searchIcaoPill").textContent = "-";
    }

    function groupBy(array, keyFn) {
      return array.reduce((acc, item) => {
        const key = keyFn(item);
        if (!acc[key]) acc[key] = [];
        acc[key].push(item);
        return acc;
      }, {});
    }

    function formatPrice(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (Number.isNaN(n)) return escapeHtml(value);
      return n.toFixed(5);
    }

    function formatErrors(errors) {
      if (!errors || errors.length === 0) return "";
      return errors.map(e => `${e.icao || ""} - ${e.message || ""}`).join(" / ");
    }

    function formatUtc(isoText) {
      try {
        const d = new Date(isoText);
        if (Number.isNaN(d.getTime())) return isoText;

        const yyyy = d.getUTCFullYear();
        const mm = String(d.getUTCMonth() + 1).padStart(2, "0");
        const dd = String(d.getUTCDate()).padStart(2, "0");
        const hh = String(d.getUTCHours()).padStart(2, "0");
        const mi = String(d.getUTCMinutes()).padStart(2, "0");

        return `${yyyy}-${mm}-${dd} ${hh}:${mi}Z`;
      } catch (e) {
        return isoText;
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("icaoInput").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        searchFuelPrice();
      }
    });
  </script>
</body>
</html>
