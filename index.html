  <title>World Fuel Price</title>

<style>
  * {
    box-sizing: border-box;
  }

  html,
  body {
    max-width: 100%;
    overflow-x: hidden;
  }

  body {
    margin: 0;
    font-family: Arial, "Noto Sans KR", sans-serif;
    color: #e9eef5;
    background:
      radial-gradient(circle at 80% 10%, rgba(180, 190, 230, 0.35), transparent 28%),
      linear-gradient(135deg, #505762 0%, #666a78 42%, #4e5365 100%);
    min-height: 100vh;
  }

  .page {
    width: 100%;
    padding: 18px;
  }

  .input-panel {
    display: grid;
    grid-template-columns: 360px auto 130px;
    gap: 8px;
    margin-bottom: 14px;
    align-items: center;
    justify-content: start;
    max-width: 100%;
  }

  input,
  button,
  select {
    height: 40px;
    font-size: 16px;
    border-radius: 6px;
    border: none;
    outline: none;
  }

  html {
    -webkit-text-size-adjust: 100%;
  }

  input,
  textarea,
  select {
    font-size: 16px !important;
    line-height: 16px;
    touch-action: manipulation;
  }

  input {
    padding: 0 12px;
    background: rgba(255,255,255,0.93);
    color: #111;
  }

  #icaoInput {
    width: 360px;
    text-transform: uppercase;
  }

  .fuel-unit-toggle {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
    width: 130px;
  }

.unit-btn {
  width: 130px;
  height: 40px;
  padding: 0 12px;
  border-radius: 6px;
  background: rgba(255,255,255,0.93);
  color: #333;
  font-size: 14px;
  font-weight: 800;
  box-shadow: none;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.unit-btn.selected {
  background: #111926;
  color: #ffffff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

.check-box {
  width: 15px;
  height: 15px;
  border: 2px solid currentColor;
  border-radius: 3px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.unit-btn.selected .check-box::after,
.select-fbo-btn.selected .check-box::after {
  content: "✓";
  font-size: 12px;
  font-weight: 900;
  line-height: 1;
}

  button {
    padding: 0 22px;
    background: #111926;
    color: #fff;
    cursor: pointer;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    white-space: nowrap;
  }

 .unit-btn:hover {
  background: rgba(255,255,255,0.93);
  color: #333;
}

.unit-btn.selected:hover {
  background: #111926;
  color: #ffffff;
}

.select-fbo-btn:hover {
  background: transparent;
  color: #00d7ff;
}

.select-fbo-btn.selected:hover {
  background: #00c8f0;
  color: #00111a;
}

  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  .search-area {
    display: grid;
    grid-template-columns: auto auto;
    grid-template-areas:
      "title airport"
      "intl corp";
    justify-content: start;
    align-items: start;
    gap: 10px 10px;
    margin-bottom: 12px;
  }

  .search-title {
    grid-area: title;
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    margin-right: 4px;
  }

  .pill {
    background: #172335;
    border-radius: 999px;
    padding: 8px 22px;
    color: #ffffff;
    font-size: 13px;
    font-weight: 700;

    text-align: center;

  .search-area .pill:nth-of-type(4) {

    width: max-content;
    justify-self: start;
  }

  .cost-table-action {

<body>
  <div id="authScreen" style="
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:#4e5365;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',Arial,sans-serif;
    color:#ffffff;
    font-size:15px;
    font-weight:700;
  ">
    승인 확인 중...
  </div>

  <div id="appRoot" style="display:none;">
    <div class="page">
      <div class="input-panel">
        <input
          id="icaoInput"
          placeholder="ex) RKSS 39000 PANC 24000 KSJC 12000"
          autocomplete="off"
        />

        <button id="searchBtn" onclick="searchFuelPrice()">조회</button>

      <div class="fuel-unit-toggle">
  <button
    type="button"
    id="unitLbsBtn"
    class="unit-btn selected"
    onclick="setFuelUnit('LBS')"
  >
    <span class="check-box"></span>
    <span>LBS</span>
  </button>

  <button
    type="button"
    id="unitUsgBtn"
    class="unit-btn"
    onclick="setFuelUnit('USG')"
  >
    <span class="check-box"></span>
    <span>USG</span>
  </button>
</div>
      </div>

      <div class="search-area">
        <span class="search-title">Your Search:</span>
        <span id="searchIcaoPill" class="pill">-</span>
        <span class="pill">International</span>
        <span class="pill">Corporate / Private</span>
      </div>

      <div class="cost-table-action">
        <button id="routeCostBtn" onclick="openCostTableModal()" disabled>
          PDF
        </button>
      </div>

      <div id="status" class="status"></div>

      <div id="resultArea">
        <div class="empty-box">조회 결과 없음</div>

        Price 기준: World Fuel API Total Price / UOM: USG 기준 / Fuel 환산: 1 USG = 6.67 lbs
      </div>
    </div>
  </div>

  <div id="costModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Expected Fuel consumption and cost by leg</h2>
        <button class="modal-close-btn" onclick="closeCostTableModal()">×</button>
      </div>

      <div id="costTableBody" class="cost-table-body"></div>

      <div class="modal-actions">
        <button onclick="printCostTable()">PDF 저장</button>
        <button onclick="closeCostTableModal()">닫기</button>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz25EDbJ7-D1RQL6EFyW81_QbFycycgjTmK-T9TIxhT6sO0V8ZtSFAj42w_baGJDa59BQ/exec";

    const LBS_PER_USG = 6.67;
    const HOME_AIRPORT = "RKSS";

    let WORLD_FUEL_APP_STARTED = false;

  const APP_STATE = {
  rows: [],
  routeItems: [],
  queryIcaoList: [],
  fuelUnit: "LBS",
  selectedFboByIcao: {},
  fboRowsByKey: {},
  usdKrwRate: 0,
  canBuildCostTable: false
};

    function showAuthorizedApp() {
      const authScreen = document.getElementById("authScreen");

    function renderFboCard(legKey, icao, fbo, fuelType, rows, routeItem) {

    function parseRouteFuelInput(raw) {
      const tokens = raw
        .replace(/,/g, " ")
        .trim()
        .toUpperCase()
        .split(/\s+/)
        .filter(Boolean);

      const routeItems = [];
      const errors = [];

      for (let i = 0; i < tokens.length; i++) {
        const token = tokens[i];

        const pairMatch = token.match(/^([A-Z]{4})(?:[:=/]([0-9]+(?:\.[0-9]+)?))?$/);

        if (!pairMatch) {
          errors.push(token);
          continue;
        }

        const icao = pairMatch[1];
        let amount = pairMatch[2] ? Number(pairMatch[2]) : null;

        const nextToken = tokens[i + 1];

        if (amount === null && nextToken && /^[0-9]+(?:\.[0-9]+)?$/.test(nextToken)) {
          amount = Number(nextToken);
          i++;
        }

        routeItems.push({
          icao,
          amount
        });
      }

      return {
        routeItems,
        errors
      };
    }

    function ensureReturnToHome(routeItems) {
      const items = routeItems.slice();

      if (items.length === 0) return items;

      const last = items[items.length - 1];

      if (last.icao !== HOME_AIRPORT) {
        items.push({
          icao: HOME_AIRPORT,
          amount: null,
          autoReturn: true
        });
      }

      return items;
    }


    function hasFuelAmountForAllLegs(routeItems) {
  if (!routeItems || routeItems.length < 2) return false;

  return routeItems.slice(0, -1).every(item => {
    return Number.isFinite(Number(item.amount)) && Number(item.amount) > 0;
  });
}
    
    function makeFboKey(legKey, icao, fbo, fuelType) {
      return [legKey, icao, fbo, fuelType].join("|||");
    }

    function selectFboByKey(key) {
      if (!APP_STATE.canBuildCostTable) return;

      const parts = key.split("|||");
      const legKey = parts[0];

      APP_STATE.selectedFboByIcao[legKey] = key;

      refreshSelectedFboButtons();
    }

    function refreshSelectedFboButtons() {
      document.querySelectorAll(".select-fbo-btn").forEach(btn => {
        const key = btn.dataset.key || "";
        const parts = key.split("|||");
        const legKey = parts[0];

        const selected = APP_STATE.selectedFboByIcao[legKey] === key;

        btn.classList.toggle("selected", selected);
        btn.title = selected ? "선택됨" : "선택";
      });
    }

    function getLegFuelAmount(routeItem) {
      const amount = routeItem.amount || 0;
      const unit = APP_STATE.fuelUnit || "LBS";

      const fuelLbs = unit === "LBS"
        ? amount
        : amount * LBS_PER_USG;

      const fuelUsg = unit === "USG"
        ? amount
        : amount / LBS_PER_USG;

      return {
        fuelLbs,
        fuelUsg
      };
    }

    function findMatchingFuelRow(rows, fuelUsg) {
      if (!rows || rows.length === 0) return null;

      return rows.find(row => {
        const from = parseNumber(row.scaleFrom);
        const to = parseNumber(row.scaleTo);

        const scaleFrom = Number.isFinite(from) ? from : 0;
        const scaleTo = Number.isFinite(to) ? to : Infinity;

        return fuelUsg >= scaleFrom && fuelUsg <= scaleTo;
      }) || null;
    }
function getUsdKrwRateFromData(data, rows) {
  const candidates = [
    data && data.usdKrwRate,
    data && data.exchangeRate,
    data && data.fxRate,
    data && data.rate,
    data && data.fxInfo && data.fxInfo.rate,
    getUsdKrwRateFromRows(rows)
  ];

  for (const value of candidates) {
    const rate = parseNumber(value);
    if (Number.isFinite(rate) && rate > 0) {
      return rate;
    }
  }

  return 0;
}
function getUsdKrwRateFromRows(rows) {
  if (!rows || rows.length === 0) return 0;

  const fxRow = rows.find(r =>
    r.usdKrwRate ||
    r.exchangeRate ||
    r.fxRate ||
    r.rate
  );

  if (!fxRow) return 0;

  const candidates = [
    fxRow.usdKrwRate,
    fxRow.exchangeRate,
    fxRow.fxRate,
    fxRow.rate
  ];

  for (const value of candidates) {
    const rate = parseNumber(value);
    if (Number.isFinite(rate) && rate > 0) {
      return rate;
    }
  }

  return 0;
}
    function parseNumber(value) {
      if (value === null || value === undefined || value === "") return NaN;
      return Number(String(value).replace(/,/g, "").trim());
    }

            const parts = key.split("|||");
            const keyLeg = parts[0];

/>

     <tr class="krw-total-row">

    ${totalKrwSum ? "₩" + totalKrwSum.toLocaleString("ko-KR") : "-"}
  </td>
</tr>

        </table>
      `;
    }


    function formatFltTimeInput(input) {
  let value = input.value.replace(/[^0-9:]/g, "");

  if (value.includes(":")) {
    const parts = value.split(":");
    let hh = (parts[0] || "").replace(/\D/g, "").slice(0, 2);
    let mm = (parts[1] || "").replace(/\D/g, "").slice(0, 2);

    input.value = mm ? `${hh}:${mm}` : hh;
    return;
  }

  const digits = value.replace(/\D/g, "").slice(0, 4);

  if (digits.length <= 2) {
    input.value = digits;
    return;
  }

  const hh = digits.slice(0, 2);
  const mm = digits.slice(2, 4);

  input.value = `${hh}:${mm}`;
}
    
    function groupBy(array, keyFn) {
      return array.reduce((acc, item) => {
        const key = keyFn(item);
        if (!acc[key]) acc[key] = [];
        acc[key].push(item);
        return acc;
      }, {});
    }

    function formatPrice(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (Number.isNaN(n)) return escapeHtml(value);
      return n.toFixed(5);
    }

    function formatPrice2(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (Number.isNaN(n)) return escapeHtml(value);
      return n.toFixed(2);
    }

    function formatCeilMoneyUsd(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (Number.isNaN(n)) return "";
      return Math.ceil(n).toLocaleString("en-US");
    }

    function formatMoneyUsd(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (Number.isNaN(n)) return "";
      return n.toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatCeilKrw100(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (Number.isNaN(n)) return "";
      return (Math.ceil(n / 100) * 100).toLocaleString("ko-KR");
    }

    function formatMoneyKrw(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (Number.isNaN(n)) return "";
      return n.toLocaleString("ko-KR", {
        maximumFractionDigits: 0
      });
    }

   function formatCeilNumber(value) {
  if (value === null || value === undefined || value === "") return "";
  const n = Number(value);
  if (Number.isNaN(n)) return "";
  return Math.round(n).toLocaleString("en-US");
}

    function formatNumber(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (Number.isNaN(n)) return "";
      return n.toLocaleString("en-US", {
        maximumFractionDigits: 2
      });
    }

    function formatErrors(errors) {
      if (!errors || errors.length === 0) return "";
      return errors.map(e => `${e.icao || ""} - ${e.message || ""}`).join(" / ");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("icaoInput").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        searchFuelPrice();
      }
    });
