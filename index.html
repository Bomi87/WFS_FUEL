<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>World Fuel Price</title>

<style>
  * {
    box-sizing: border-box;
  }

  html,
  body {
    max-width: 100%;
    overflow-x: hidden;
  }

  body {
    margin: 0;
    font-family: Arial, "Noto Sans KR", sans-serif;
    color: #e9eef5;
    background:
      radial-gradient(circle at 80% 10%, rgba(180, 190, 230, 0.35), transparent 28%),
      linear-gradient(135deg, #505762 0%, #666a78 42%, #4e5365 100%);
    min-height: 100vh;
  }

  .page {
    width: 100%;
    padding: 18px;
  }

  .input-panel {
    display: grid;
    grid-template-columns: 300px auto 130px;
    gap: 8px;
    margin-bottom: 14px;
    align-items: center;
    justify-content: start;
    max-width: 100%;
  }

  input,
  button {
    height: 40px;
    font-size: 15px;
    border-radius: 6px;
    border: none;
    outline: none;
  }

  input {
    padding: 0 12px;
    background: rgba(255,255,255,0.93);
    color: #111;
  }

  #icaoInput {
    width: 300px;
    text-transform: uppercase;
  }

  #fuelLbsInput {
    width: 130px;
    text-transform: none;
  }

  button {
    padding: 0 22px;
    background: #111926;
    color: #fff;
    cursor: pointer;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    white-space: nowrap;
  }

  button:hover {
    background: #1a2638;
  }

  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  .search-area {
    display: grid;
    grid-template-columns: auto auto;
    grid-template-areas:
      "title airport"
      "intl corp";
    justify-content: start;
    align-items: center;
    gap: 10px 10px;
    margin-bottom: 24px;
  }

  .search-title {
    grid-area: title;
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    margin-right: 4px;
  }

  .pill {
    background: #172335;
    border-radius: 999px;
    padding: 8px 22px;
    color: #ffffff;
    font-size: 13px;
    font-weight: 700;
    min-width: 78px;
    width: max-content;
    white-space: nowrap;
    text-align: center;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
  }

  #searchIcaoPill {
    grid-area: airport;
    max-width: 520px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .search-area .pill:nth-of-type(3) {
    grid-area: intl;
    width: max-content;
    justify-self: start;
  }

  .search-area .pill:nth-of-type(4) {
    grid-area: corp;
    width: max-content;
    justify-self: start;
  }

  .status {
    margin-top: 8px;
    margin-bottom: 20px;
    font-size: 14px;
    color: #dce5f0;
    min-height: 20px;
  }

  .success {
    color: #d7ffe2;
    font-weight: 700;
  }

  .error {
    color: #ffb0b0;
    font-weight: 700;
  }

  .airport-section {
    --section-bg: #0f1b2a;
    --section-border: rgba(120, 174, 232, 0.65);
    --section-accent: #78aee8;

    --card-bg: #182436;
    --card-head-bg: #203752;
    --card-subhead-bg: #182436;
    --card-summary-bg: #263a54;

    margin-bottom: 36px;
    padding: 16px 14px 18px;
    border-radius: 14px;
    background: var(--section-bg);
    border: 1px solid var(--section-border);
    border-left: 10px solid var(--section-accent);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.05),
      0 10px 24px rgba(0,0,0,0.18);
  }

  .airport-section:nth-of-type(odd) {
    --section-bg: #0f1b2a;
    --section-border: rgba(120, 174, 232, 0.65);
    --section-accent: #78aee8;

    --card-bg: #182436;
    --card-head-bg: #203752;
    --card-subhead-bg: #182436;
    --card-summary-bg: #263a54;
  }

  .airport-section:nth-of-type(even) {
    --section-bg: #5f6878;
    --section-border: rgba(255, 230, 170, 0.75);
    --section-accent: #f2c96d;

    --card-bg: #303b4a;
    --card-head-bg: #44566c;
    --card-subhead-bg: #303b4a;
    --card-summary-bg: #4b5e74;
  }

  .airport-title {
    display: inline-block;
    font-size: 18px;
    font-weight: 800;
    margin: 0 0 14px;
    color: #ffffff;
    letter-spacing: 0.3px;
    padding: 4px 10px;
    border-radius: 8px;
    background: rgba(0,0,0,0.20);
    border: 1px solid rgba(255,255,255,0.14);
  }

  .fbo-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(320px, 620px));
    gap: 22px;
    justify-content: start;
  }

  .fbo-card {
    min-width: 0;
    max-width: 620px;
  }

  .fbo-title {
    font-size: 14px;
    font-weight: 800;
    color: #ffffff;
    margin-bottom: 8px;
    text-transform: uppercase;
    padding-left: 2px;
  }

  .fuel-table {
    width: 100%;
    max-width: 620px;
    border-collapse: collapse;
    background: var(--card-bg);
    color: #dfe8f4;
    font-size: 13px;
    overflow: hidden;
    border-radius: 6px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.12);
  }

  .fuel-table thead tr:first-child th {
    background: var(--card-head-bg);
    color: #ffffff;
    text-align: left;
    padding: 9px 12px;
    font-size: 12px;
    font-weight: 800;
    border-bottom: 1px solid rgba(255,255,255,0.16);
  }

  .fuel-table thead tr:nth-child(2) th {
    background: var(--card-subhead-bg);
    color: #d3ddec;
    padding: 12px 8px;
    font-size: 11px;
    font-weight: 700;
    border-bottom: 1px solid rgba(255,255,255,0.12);
  }

  .fuel-table thead tr:nth-child(2) th:first-child,
  .fuel-table tbody td:first-child {
    text-align: left;
    padding-left: 14px;
  }

  .fuel-table thead tr:nth-child(2) th:nth-child(2),
  .fuel-table tbody td:nth-child(2) {
    text-align: center;
  }

  .fuel-table td {
    padding: 15px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.10);
    font-weight: 700;
    color: #dce6f2;
  }

  .fuel-table tbody tr:hover {
    background: rgba(255,255,255,0.045);
  }

  .cost-summary-row td {
    background: var(--card-summary-bg);
    color: #ffffff;
    font-weight: 800;
    line-height: 1.7;
    padding-top: 12px;
    padding-bottom: 12px;
  }

  .cost-summary {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .cost-summary small {
    color: #d3ddec;
    font-size: 11px;
    font-weight: 700;
  }

  .empty-box {
    background: rgba(17, 25, 38, 0.65);
    border-radius: 8px;
    padding: 30px;
    text-align: center;
    color: #c5ceda;
    font-weight: 700;
  }

  .footer-note {
    margin-top: 12px;
    color: #c4ccd8;
    font-size: 12px;
  }

  @media (max-width: 900px) {
    .fbo-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 600px) {
    .page {
      width: 100%;
      max-width: 100%;
      padding: 12px;
      overflow-x: hidden;
    }

    .input-panel {
      grid-template-columns: minmax(0, 1fr) auto 86px;
      gap: 6px;
      width: 100%;
      max-width: 100%;
    }

    #icaoInput {
      width: 100%;
      min-width: 0;
    }

    #searchBtn {
      width: auto;
      min-width: 48px;
      height: 34px;
      padding: 0 9px;
      font-size: 12px;
    }

    #fuelLbsInput {
      width: 86px;
      min-width: 0;
      height: 34px;
      padding: 0 7px;
      font-size: 12px;
    }

    .search-area {
      grid-template-columns: auto minmax(0, 1fr);
      grid-template-areas:
        "title airport"
        "intl corp";
      gap: 8px 8px;
    }

    #searchIcaoPill {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pill {
      padding: 7px 12px;
      font-size: 13px;
      width: max-content;
      white-space: nowrap;
    }

    .search-area .pill:nth-of-type(3) {
      grid-area: intl;
      width: max-content;
      justify-self: start;
    }

    .search-area .pill:nth-of-type(4) {
      grid-area: corp;
      width: max-content;
      justify-self: start;
    }

    .airport-section {
      padding: 12px 10px 14px;
      margin-bottom: 30px;
      border-radius: 10px;
      border-left-width: 8px;
    }

    .fbo-grid,
    .fbo-card,
    .fuel-table {
      width: 100%;
      max-width: 100%;
    }

    .fuel-table {
      font-size: 12px;
    }

    .fuel-table td {
      padding: 12px 8px;
    }
  }
</style>

  
  
</head>

<body>
  <div class="page">
    <div class="input-panel">
      <input
        id="icaoInput"
        placeholder="ICAO 예: KEWR PANC KIAD"
        autocomplete="off"
      />

      <button id="searchBtn" onclick="searchFuelPrice()">조회</button>

      <input
        id="fuelLbsInput"
        placeholder="Fuel lbs"
        inputmode="numeric"
        autocomplete="off"
      />
    </div>

    <div class="search-area">
      <span class="search-title">Your Search:</span>
      <span id="searchIcaoPill" class="pill">-</span>
      <span class="pill">International</span>
      <span class="pill">Corporate / Private</span>
    </div>

    <div id="status" class="status">
      ICAO를 입력하세요. 예: KEWR PANC KIAD
    </div>

    <div id="resultArea">
      <div class="empty-box">조회 결과 없음</div>
    </div>

    <div class="footer-note">
      Price 기준: World Fuel API Total Price / UOM: USG 기준 / Fuel 환산: 1 USG = 6.7 lbs
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxG5KKFL4bmCIei0nY7ziLpVetBo_Bx4yE4mQujPedSOUaA_1l6RnPWiWx2Js4d_0-f/exec";

    function searchFuelPrice() {
      const inputEl = document.getElementById("icaoInput");
      const fuelLbsEl = document.getElementById("fuelLbsInput");
      const statusEl = document.getElementById("status");
      const resultArea = document.getElementById("resultArea");
      const searchBtn = document.getElementById("searchBtn");

      const icaoRaw = inputEl.value.trim().toUpperCase();
      const fuelLbsRaw = fuelLbsEl.value.trim().replace(/,/g, "");
      const fuelLbs = fuelLbsRaw ? Number(fuelLbsRaw) : 0;

      if (fuelLbsRaw && (!Number.isFinite(fuelLbs) || fuelLbs <= 0)) {
        statusEl.innerHTML =
          '<span class="error">Fuel lbs 값을 숫자로 입력하세요.</span>';
        return;
      }

      const icaoList = icaoRaw
        .split(/[\s,]+/)
        .map(x => x.trim().toUpperCase())
        .filter(Boolean);

      const invalidList = icaoList.filter(x => !/^[A-Z]{4}$/.test(x));

      if (icaoList.length === 0) {
        statusEl.innerHTML =
          '<span class="error">ICAO를 입력하세요. 예: KEWR PANC KIAD</span>';
        return;
      }

      if (invalidList.length > 0) {
        statusEl.innerHTML =
          '<span class="error">ICAO 형식 오류: ' +
          escapeHtml(invalidList.join(", ")) +
          '</span>';
        return;
      }

      searchBtn.disabled = true;
      statusEl.textContent = "조회 중...";
      resultArea.innerHTML = '<div class="empty-box">Loading...</div>';

      document.getElementById("searchIcaoPill").textContent = icaoList.join(", ");

      const callbackName = "wfsCallback_" + Date.now();

      window[callbackName] = function (data) {
        try {
          handleFuelPriceResult(data, icaoList);
        } catch (err) {
          resultArea.innerHTML = '<div class="empty-box">조회 실패</div>';
          statusEl.innerHTML =
            '<span class="error">' + escapeHtml(err.message) + '</span>';
        } finally {
          searchBtn.disabled = false;
          delete window[callbackName];

          const oldScript = document.getElementById(callbackName);
          if (oldScript) oldScript.remove();
        }
      };

      const script = document.createElement("script");
      script.id = callbackName;

      script.onerror = function () {
        resultArea.innerHTML = '<div class="empty-box">조회 실패</div>';
        statusEl.innerHTML =
          '<span class="error">Apps Script 호출 실패. Web App URL, 배포 권한, 또는 JSONP 설정을 확인하세요.</span>';

        searchBtn.disabled = false;
        delete window[callbackName];

        const oldScript = document.getElementById(callbackName);
        if (oldScript) oldScript.remove();
      };

      script.src =
        SCRIPT_URL +
        "?icao=" + encodeURIComponent(icaoList.join(",")) +
        "&fuelLbs=" + encodeURIComponent(fuelLbs || "") +
        "&callback=" + encodeURIComponent(callbackName) +
        "&t=" + Date.now();

      document.body.appendChild(script);
    }

    function handleFuelPriceResult(data, icaoList) {
      const statusEl = document.getElementById("status");
      const resultArea = document.getElementById("resultArea");

      if (!data.success && !data.partialSuccess) {
        throw new Error(data.message || formatErrors(data.errors) || "조회 실패");
      }

      const rows = data.rows || [];

      if (rows.length === 0) {
        resultArea.innerHTML = '<div class="empty-box">결과 없음</div>';
        statusEl.textContent = "";
        return;
      }

      renderAirportSections(rows, data.icaoList || icaoList);

      if (data.errors && data.errors.length > 0) {
        statusEl.innerHTML =
          '<span class="error">일부 공항 오류: ' +
          escapeHtml(formatErrors(data.errors)) +
          '</span>';
      } else {
        statusEl.textContent = "";
      }
    }

    function renderAirportSections(rows, icaoList) {
      const resultArea = document.getElementById("resultArea");
      const byIcao = groupBy(rows, r => r.icao || "");

      const sections = [];

      icaoList.forEach(icao => {
        const airportRows = byIcao[icao] || [];

        if (airportRows.length === 0) {
          sections.push(`
            <section class="airport-section">
              <h2 class="airport-title">${escapeHtml(icao)}</h2>
              <div class="empty-box">해당 Fuel lbs에 맞는 가격 구간 없음</div>
            </section>
          `);
          return;
        }

        const byFbo = groupBy(airportRows, r => r.fbo || "UNKNOWN FBO");

        const fboCards = Object.keys(byFbo).map(fbo => {
          return renderFboCard(fbo, byFbo[fbo]);
        }).join("");

        sections.push(`
          <section class="airport-section">
            <h2 class="airport-title">${escapeHtml(icao)}</h2>
            <div class="fbo-grid">
              ${fboCards}
            </div>
          </section>
        `);
      });

      resultArea.innerHTML = sections.join("");
    }

    function renderFboCard(fbo, rows) {
      const fuelType = getFuelTypeText(rows);

      const body = rows.map(row => {
        const fromTo = `${escapeHtml(row.scaleFrom || "")} - ${escapeHtml(row.scaleTo || "")}`;

        let summaryRow = "";

        if (row.totalCostUsd || row.totalCostKrw) {
          summaryRow = `
            <tr class="cost-summary-row">
              <td colspan="2">
                <div class="cost-summary">
                  <div>총 비용 USD: ${formatMoneyUsd(row.totalCostUsd)}</div>
                  <div>총 비용 KRW: ${formatMoneyKrw(row.totalCostKrw)}</div>
                  <small>
                    Fuel: ${formatNumber(row.fuelLbs)} lbs / ${formatNumber(row.fuelUsg)} USG
                    ${row.usdKrwRate ? " / 환율: " + formatNumber(row.usdKrwRate) : ""}
                  </small>
                </div>
              </td>
            </tr>
          `;
        }

        return `
          <tr>
            <td>${fromTo}</td>
            <td>${formatPrice(row.totalPrice)}</td>
          </tr>
          ${summaryRow}
        `;
      }).join("");

      return `
        <div class="fbo-card">
          <div class="fbo-title">${escapeHtml(fbo)}</div>
          <table class="fuel-table">
            <thead>
              <tr>
                <th colspan="2">${escapeHtml(fuelType)}</th>
              </tr>
              <tr>
                <th>FROM - TO (USG)</th>
                <th>TOTAL PRICE (USD)</th>
              </tr>
            </thead>
            <tbody>
              ${body}
            </tbody>
          </table>
        </div>
      `;
    }

    function getFuelTypeText(rows) {
      if (!rows || rows.length === 0) return "FUEL";

      const types = [...new Set(
        rows
          .map(r => r.fuelType || "")
          .filter(Boolean)
      )];

      if (types.length === 0) return "FUEL";
      return types.join(" / ");
    }

    function groupBy(array, keyFn) {
      return array.reduce((acc, item) => {
        const key = keyFn(item);
        if (!acc[key]) acc[key] = [];
        acc[key].push(item);
        return acc;
      }, {});
    }

    function formatPrice(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (Number.isNaN(n)) return escapeHtml(value);
      return n.toFixed(5);
    }

    function formatMoneyUsd(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (Number.isNaN(n)) return "";
      return n.toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatMoneyKrw(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (Number.isNaN(n)) return "";
      return n.toLocaleString("ko-KR", {
        maximumFractionDigits: 0
      });
    }

    function formatNumber(value) {
      if (value === null || value === undefined || value === "") return "";
      const n = Number(value);
      if (Number.isNaN(n)) return "";
      return n.toLocaleString("en-US", {
        maximumFractionDigits: 2
      });
    }

    function formatErrors(errors) {
      if (!errors || errors.length === 0) return "";
      return errors.map(e => `${e.icao || ""} - ${e.message || ""}`).join(" / ");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("icaoInput").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        searchFuelPrice();
      }
    });

    document.getElementById("fuelLbsInput").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        searchFuelPrice();
      }
    });
  </script>
</body>
</html>
